<!DOCTYPE html>
<html lang="uk">
  <head>
    <meta charset="UTF-8" />
    <title>Контакти</title>

    <link rel="stylesheet" href="styles.css" />
    <link rel="stylesheet" href="responsive.css" />
  </head>

  <body>
    <!-- HEADER -->
    <header class="site-header">
      <h1>Контакти</h1>

      <button class="menu-toggle">☰</button>
      <button class="theme-toggle">🌙</button>

      <nav>
        <ul class="nav-list">
          <li><a href="index.html">Головна</a></li>
          <li><a href="about.html">Про мене</a></li>
          <li><a href="contact.html">Контакти</a></li>
        </ul>
      </nav>
    </header>

    <!-- MAIN -->
    <main class="container">
      <section class="section card">
        <h2>📩 Напишіть мені</h2>

        <form class="contact-form">
          <input name="name" placeholder="Ім’я" required />
          <input name="email" placeholder="Email" required />
          <textarea
            name="message"
            placeholder="Повідомлення"
            required
          ></textarea>

          <button type="submit">Відправити</button>
        </form>

        <div class="char-counter">0 символів</div>
        <div id="form-status"></div>

        <button class="clear-draft">Очистити чернетку</button>
      </section>
    </main>

    <!-- FOOTER -->
    <footer class="site-footer">
      <p>&copy; <span id="year"></span> Руслан</p>
    </footer>

    <!-- BACK TO TOP -->
    <button class="back-to-top" hidden>↑</button>

    <!-- JS -->
    <script src="js/main.js" defer></script>
  </body>
</html>
