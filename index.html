<!DOCTYPE html>
<html lang="uk">
  <head>
    <meta charset="UTF-8" />
    <title>Головна</title>

    <link rel="stylesheet" href="styles.css" />
    <link rel="stylesheet" href="responsive.css" />
  </head>

  <body>
    <!-- HEADER -->
    <header class="site-header">
      <h1 id="typing">Мій сайт</h1>

      <button class="menu-toggle">☰</button>
      <button class="theme-toggle">🌙</button>

      <nav>
        <ul class="nav-list">
          <li><a href="index.html">Головна</a></li>
          <li><a href="about.html">Про мене</a></li>
          <li><a href="contact.html">Контакти</a></li>
        </ul>
      </nav>
    </header>

    <!-- MAIN -->
    <main class="container">
      <!-- SEARCH -->
      <section class="section card">
        <h2>🔎 Пошук</h2>
        <input class="search-box" placeholder="Пошук сервісу..." />
      </section>

      <!-- FILTER + SORT -->
      <section class="section card">
        <h2>📂 Сервіси</h2>

        <div class="filters">
          <button data-filter="all">Все</button>
          <button data-filter="development">Розробка</button>
          <button data-filter="design">Дизайн</button>
          <button data-filter="marketing">Маркетинг</button>
          <button data-filter="education">Навчання</button>
        </div>

        <select id="sortSelect">
          <option value="">Без сортування</option>
          <option value="az">A-Z</option>
          <option value="price">За ціною</option>
        </select>

        <!-- STATES -->
        <div id="loading" hidden>Завантаження...</div>
        <div id="error" hidden>Помилка завантаження ❌</div>

        <!-- JSON RENDER -->
        <div class="services"></div>
      </section>

      <!-- FAQ -->
      <section class="section card">
        <h2>❓ FAQ</h2>

        <div class="accordion-item">
          <h3>HTML</h3>
          <p>Структура сайту</p>
        </div>

        <div class="accordion-item">
          <h3>CSS</h3>
          <p>Стилі</p>
        </div>
      </section>

      <!-- MODAL -->
      <section class="section card">
        <button data-modal-open>Відкрити модалку</button>

        <div class="modal">
          <div class="modal-content">
            <button class="modal-close">X</button>
            <p>Це модальне вікно</p>
          </div>
        </div>
      </section>
    </main>

    <!-- FOOTER -->
    <footer class="site-footer">
      <p>&copy; <span id="year"></span> Руслан</p>
    </footer>

    <!-- BACK TO TOP -->
    <button class="back-to-top" hidden>↑</button>

    <!-- JS -->
    <script src="js/main.js" defer></script>
  </body>
</html>
